name: Daily BuenaVista Post

on:
  schedule:
    # Runs at 4:30 PM IST (11:00 AM UTC) every day
    - cron: "0 11 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to Bluesky
        env:
          OTM_API_KEY: ${{ secrets.OTM_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python post_to_bluesky.py

      
      - name: Commit new location files
        run: |
          git config user.name "Vignesh"
          git config user.email "laserlikefocus000@gmail.com"
          git add DailyViews/
          git diff --cached --quiet || git commit -m "Daily location: $(date +%Y-%m-%d)"
          git push
